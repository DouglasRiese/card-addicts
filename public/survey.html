<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Survey - Card Addicts</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootswatch/5.3.3/minty/bootstrap.min.css"
          integrity="sha512-+/uDiVv4ZLhHnXToJFPwYK08kkG2et1rSuiitOl+0hdzmx2N6HQaMqm/7ORzr8dhco+cyGZCRxkXU7EMMYOLfQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/styles/style.css" />
    <link rel="stylesheet" href="/styles/survey.css" />
    <link rel="icon" href="/images/icons/playing_cards.png" />
    <link rel="stylesheet" href="/styles/navbar.css" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light rounded-3">
    <div class="container-fluid">
        <a class="navbar-brand" href="/games.html">
            <img src="/images/icons/playing_cards.png" height="50" alt="Card Addicts icon" />
            Card Addicts
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-item nav-link" href="/games.html">Games</a></li>
                <li class="nav-item"><a class="nav-item nav-link active" href="/survey.html">Survey</a></li>
                <li class="nav-item"><a class="nav-item nav-link" href="/avatar.html">Avatar</a></li>
                <li class="nav-item"><a class="nav-item nav-link" href="/recent-activity.html">Recent Activity</a></li>
                <li class="nav-item"><a class="nav-item nav-link" href="/login.html">Login</a></li>
                <li class="nav-item d-flex align-items-center ms-lg-3" id="navAuthSlot"></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-4">
    <h2>Survey</h2>

    <div id="authRequiredMessage" class="alert alert-warning d-none">
        You must be logged in to submit the survey.
        <a href="/login.html" class="alert-link">Go to login/signup</a>
    </div>

    <div id="currentUserMessage" class="alert alert-info d-none"></div>

    <div id="successMessage" class="alert alert-success d-none" role="alert">
        Your survey has been submitted!
    </div>

    <div id="serverErrorMessage" class="alert alert-danger d-none" role="alert"></div>

    <form id="surveyForm" class="col-md-6" novalidate>
        <div class="mb-3">
            <label for="emailID" class="form-label">Email (optional)</label>
            <input type="email" name="email" id="emailID" placeholder="example@mail.com" class="form-control"/>
            <div class="invalid-feedback" id="emailError"></div>
        </div>

        <div class="mb-3">
            <label for="feedbackID" class="form-label">How do you like our website?</label>
            <textarea name="feedback" id="feedbackID" rows="8" minlength="10" maxlength="600" class="form-control">
            </textarea>
            <div class="invalid-feedback" id="feedbackError"></div>
        </div>

        <div class="mb-3">
            <label for="ratingID" class="form-label">How likely are you to recommend us to a friend?</label>
            <div>
                <span class="float-end">Absolutely!</span>
                Never
                <input type="range" name="rating" id="ratingID" step="1" min="1" max="10" value="5" class="form-range"/>
                <div class="small text-muted">Selected rating: <span id="ratingValue">5</span></div>
                <div class="invalid-feedback d-block" id="ratingError"></div>
            </div>
        </div>

        <div class="container mb-3 p-0 m-0">
            <p>What game would you like added most?</p>
            <div class="btn-group mb-2 form-check p-0" role="group" aria-label="Game choices">
                <input type="radio" class="btn-check" name="gameChoice" id="gameChoice0" autocomplete="off" value="War 2">
                <label class="btn btn-outline-primary" for="gameChoice0">War 2</label>

                <input type="radio" class="btn-check" name="gameChoice" id="gameChoice1" autocomplete="off" value="Solitaire">
                <label class="btn btn-outline-primary" for="gameChoice1">Solitaire</label>

                <input type="radio" class="btn-check" name="gameChoice" id="gameChoice2" autocomplete="off" value="Blackjack">
                <label class="btn btn-outline-primary" for="gameChoice2">Blackjack</label>

                <input type="radio" class="btn-check" name="gameChoice" id="gameChoice3" autocomplete="off" value="None">
                <label class="btn btn-outline-primary" for="gameChoice3">None</label>
            </div>
            <p class="text-danger mb-0" id="gameChoiceError"></p>
        </div>

        <div class="mb-3">
            <input type="checkbox" name="agreed" id="agreedID" value="yes" class="form-check-input">
            <label for="agreedID" class="form-check-label">
                I agree to my feedback being shared with the developers
            </label>
            <div class="invalid-feedback d-block" id="agreedError"></div>
        </div>

        <button type="submit" class="btn btn-primary" id="submitButton" disabled>Submit</button>
    </form>
</main>
<script src="/scripts/navbar.js"></script>
<script src="/scripts/survey.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>
</html>
