<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avatar - Card Addicts</title>

    <link rel="stylesheet" href="/styles/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootswatch/5.3.3/minty/bootstrap.min.css"
          integrity="sha512-+/uDiVv4ZLhHnXToJFPwYK08kkG2et1rSuiitOl+0hdzmx2N6HQaMqm/7ORzr8dhco+cyGZCRxkXU7EMMYOLfQ=="
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/styles/avatar.css" />
    <link rel="icon" href="/images/icons/playing_cards.png" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light rounded-3">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">
            <img src="/images/icons/playing_cards.png" height="50" alt="Card Addicts icon" />
            Card Addicts
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-item nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-item nav-link" href="/survey.html">Survey</a></li>
                <li class="nav-item"><a class="nav-item nav-link active" href="/avatar.html">Avatar</a></li>
                <li class="nav-item"><a class="nav-item nav-link disabled" href="#">Recent Activity</a></li>
                <li class="nav-item"><a class="nav-item nav-link" href="/login.html">Login</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-4">
    <h2>Avatar</h2>

    <div id="authRequiredMessage" class="alert alert-warning d-none">
        You must be logged in to manage your avatar.
        <a href="/login.html" class="alert-link">Go to login/signup</a>
    </div>

    <div id="currentUserMessage" class="alert alert-info d-none"></div>
    <div id="avatarErrorMessage" class="alert alert-danger d-none"></div>
    <div id="avatarSuccessMessage" class="alert alert-success d-none"></div>

    <div id="avatarApp" class="d-none">
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card shadow-sm p-3">
                    <h4>Selected Avatar</h4>
                    <img id="selectedAvatarImage" class="avatar-large mb-3" alt="Selected avatar" src="">
                    <div id="selectedAvatarName" class="fw-semibold"></div>

                    <hr>

                    <form id="avatarUploadForm">
                        <div class="mb-3">
                            <label for="customAvatarImage" class="form-label">Upload Avatar Image</label>
                            <input type="file" id="customAvatarImage" name="customAvatarImage" class="form-control" accept="image/*">
                            <div class="form-text">Max 2 MB. Images only.</div>
                        </div>
                        <button type="submit" class="btn btn-warning">Upload File</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card shadow-sm p-3">
                    <h4>Available Avatars</h4>
                    <div id="avatarGrid" class="row g-3 mt-1"></div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="/scripts/avatar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>
</html>
