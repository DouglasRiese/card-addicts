<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recent Activity - Card Addicts</title>

    <link rel="stylesheet" href="/styles/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootswatch/5.3.3/minty/bootstrap.min.css"
          integrity="sha512-+/uDiVv4ZLhHnXToJFPwYK08kkG2et1rSuiitOl+0hdzmx2N6HQaMqm/7ORzr8dhco+cyGZCRxkXU7EMMYOLfQ=="
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" href="/images/icons/playing_cards.png" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light rounded-3">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">
            <img src="/images/icons/playing_cards.png" height="50" alt="Card Addicts icon" />
            Card Addicts
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-item nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-item nav-link" href="/survey.html">Survey</a></li>
                <li class="nav-item"><a class="nav-item nav-link" href="/avatar.html">Avatar</a></li>
                <li class="nav-item"><a class="nav-item nav-link active" href="/recent-activity.html">Recent Activity</a></li>
                <li class="nav-item"><a class="nav-item nav-link" href="/login.html">Login</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-4">
    <h2>Recent Activity</h2>

    <div id="authRequiredMessage" class="alert alert-warning d-none">
        You must be logged in to view recent activity.
        <a href="/login.html" class="alert-link">Go to login/signup</a>
    </div>

    <div id="currentUserMessage" class="alert alert-info d-none"></div>
    <div id="activityErrorMessage" class="alert alert-danger d-none"></div>

    <p class="mb-3">Only the 4 most recent activities are shown. Most recent at the top.</p>

    <div id="noActivityMessage" class="alert alert-secondary d-none">
        No recent activity.
    </div>

    <div class="table-responsive">
        <table class="table d-none" id="activityTable">
            <thead>
            <tr>
                <th scope="col">Date</th>
                <th scope="col">Time</th>
                <th scope="col">Page</th>
                <th scope="col">Action</th>
            </tr>
            </thead>
            <tbody id="activityTableBody"></tbody>
        </table>
    </div>
</main>

<script src="/scripts/recent-activity.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>
</html>
