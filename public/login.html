<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Auth - Card Addicts</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootswatch/5.3.3/minty/bootstrap.min.css"
          integrity="sha512-+/uDiVv4ZLhHnXToJFPwYK08kkG2et1rSuiitOl+0hdzmx2N6HQaMqm/7ORzr8dhco+cyGZCRxkXU7EMMYOLfQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <link rel="stylesheet" href="/styles/style.css"/>
    <link rel="stylesheet" href="/styles/login.css"/>
    <link rel="icon" href="/images/icons/playing_cards.png"/>
    <link rel="stylesheet" href="/styles/navbar.css" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light rounded-3">
    <div class="container-fluid">
        <a class="navbar-brand" href="/public">
            <img src="/images/icons/playing_cards.png" height="50" alt="Card Addicts icon"/>
            Card Addicts
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-item nav-link" href="/home.html">Home</a></li>
                <li class="nav-item"><a class="nav-item nav-link" href="/survey.html">Survey</a></li>
                <li class="nav-item"><a class="nav-item nav-link" href="/avatar.html">Avatar</a></li>
                <li class="nav-item"><a class="nav-item nav-link" href="/recent-activity.html">Recent Activity</a></li>
                <li class="nav-item"><a class="nav-item nav-link active" href="/login.html">Login</a></li>
                <li class="nav-item d-flex align-items-center ms-lg-3" id="navAuthSlot"></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-4">
    <h2>Account</h2>

    <div id="authStatus" class="alert alert-info">
        Checking login status...
    </div>

    <div id="authError" class="alert alert-danger d-none"></div>
    <div id="authSuccess" class="alert alert-success d-none"></div>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h4 class="card-title">Sign Up</h4>
                    <form id="signupForm" novalidate>
                        <div class="mb-3">
                            <label for="signupEmail" class="form-label">Email</label>
                            <input type="email" id="signupEmail" class="form-control"/>
                            <div class="invalid-feedback" id="signupEmailError"></div>
                        </div>

                        <div class="mb-3">
                            <label for="signupPassword" class="form-label">Password</label>
                            <input type="password" id="signupPassword" class="form-control"/>
                            <div class="invalid-feedback" id="signupPasswordError"></div>
                        </div>

                        <button type="submit" class="btn btn-primary">Create Account</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h4 class="card-title">Log In</h4>
                    <form id="loginForm" novalidate>
                        <div class="mb-3">
                            <label for="loginEmail" class="form-label">Email</label>
                            <input type="email" id="loginEmail" class="form-control"/>
                            <div class="invalid-feedback" id="loginEmailError"></div>
                        </div>

                        <div class="mb-3">
                            <label for="loginPassword" class="form-label">Password</label>
                            <input type="password" id="loginPassword" class="form-control"/>
                            <div class="invalid-feedback" id="loginPasswordError"></div>
                        </div>

                        <button type="submit" class="btn btn-success">Log In</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="/scripts/navbar.js"></script>
<script src="/scripts/login.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>
</html>
