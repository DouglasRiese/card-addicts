<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card Addicts</title>

    <link rel="stylesheet" href="/styles/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootswatch/5.3.3/minty/bootstrap.min.css"
          integrity="sha512-+/uDiVv4ZLhHnXToJFPwYK08kkG2et1rSuiitOl+0hdzmx2N6HQaMqm/7ORzr8dhco+cyGZCRxkXU7EMMYOLfQ=="
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/styles/home.css" />
    <link rel="icon" href="/images/icons/playing_cards.png" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light rounded-3">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">
            <img src="/images/icons/playing_cards.png" height="50" alt="Card Addicts icon" />
            Card Addicts
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-item nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-item nav-link" href="/survey.html">Survey</a></li>
                <li class="nav-item"><a class="nav-item nav-link disabled" href="#">Avatar</a></li>
                <li class="nav-item"><a class="nav-item nav-link disabled" href="#">Recent Activity</a></li>
                <li class="nav-item"><a class="nav-item nav-link disabled" href="#">Login</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container p-4">
    <div class="row g-4 align-items-start">
        <div class="col-md-4">
            <a href="#" class="text-decoration-none text-dark">
                <div class="card h-100 shadow-sm">
                    <img src="/images/cards4.jpg" alt="Cards" class="img-fluid card-img-top">
                    <div class="card-body">
                        <h4 class="card-title mb-0">War (1 player)</h4>
                    </div>
                </div>
            </a>
        </div>

        <div class="col-md-8">
            <h4 class="mb-3">More Games to Come</h4>
            <div class="row g-3">
                <div class="col-sm-4">
                    <div class="card h-100 shadow-sm">
                        <img src="/images/cards1.jpg" alt="Cards" class="img-fluid card-img-top">
                        <div class="card-body">
                            <span>Solitaire</span>
                        </div>
                    </div>
                </div>

                <div class="col-sm-4">
                    <div class="card h-100 shadow-sm">
                        <img src="/images/cards2.jpg" alt="Cards" class="img-fluid card-img-top">
                        <div class="card-body">
                            <span>War 2.0</span>
                        </div>
                    </div>
                </div>

                <div class="col-sm-4">
                    <div class="card h-100 shadow-sm">
                        <img src="/images/cards3.jpg" alt="Cards" class="img-fluid card-img-top">
                        <div class="card-body">
                            <span>Blackjack</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>
</html>
